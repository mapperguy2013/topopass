<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Practice overview dashboard</title>
  <desc id="desc">A clean practice overview dashboard showing topographical skills, SERU preparation, a route on a soft map background, and progress statistics.</desc>
  <defs>
    <filter id="cardShadow" x="-8%" y="-10%" width="116%" height="126%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1d4ed8" flood-opacity="0.10"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <filter id="pinShadow" x="-45%" y="-22%" width="190%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <filter id="routeShadow" x="-8%" y="-20%" width="116%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#2563eb" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="mapFade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="0.52" stop-color="#eef6ff" stop-opacity="0.84"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.70"/>
    </linearGradient>
    <linearGradient id="blueRoute" x1="220" y1="732" x2="1328" y2="206" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="accuracyArc" x1="169" y1="881" x2="299" y2="881" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6aa1ff"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

