name: topopass-prod

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: topopass-caddy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - ${TOPOPASS_PROXY_ENV_FILE:-/srv/topopass/env/proxy.env}
    ports:
      - "80:80"
      # Domain/HTTPS is paused for the temporary Elastic IP smoke test.
      # Re-enable these mappings when Route 53 and Caddy HTTPS are configured.
      # - "443:443"
      # - "443:443/udp"
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/topopass/logs/caddy:/var/log/caddy
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - topopass-prod

  app:
    image: ${TOPOPASS_IMAGE:-006419716542.dkr.ecr.eu-west-2.amazonaws.com/topopass-web:latest}
    container_name: topopass-web
    restart: unless-stopped
    env_file:
      - ${TOPOPASS_APP_ENV_FILE:-/srv/topopass/env/app.env}
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - topopass-prod

networks:
  topopass-prod:
    name: topopass-prod

volumes:
  caddy_data:
    name: topopass-caddy-data
  caddy_config:
    name: topopass-caddy-config
