name: Publish Docker image to Amazon ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and push app image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Required GitHub repository variables:
      # - AWS_REGION: AWS region containing the private ECR repository.
      # - AWS_ROLE_TO_ASSUME: IAM role ARN trusted by GitHub OIDC.
      # - ECR_REPOSITORY: private ECR repository name, for example topopass/topopass-web.
      # - NEXT_PUBLIC_MAPBOX_TOKEN: public Mapbox token used by map-click pages.
      #
      # Do not store AWS access keys in this repository. Prefer OIDC role
      # assumption so short-lived credentials are issued only for this workflow.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Validate public build config
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ vars.NEXT_PUBLIC_MAPBOX_TOKEN }}
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || {
            echo "NEXT_PUBLIC_SUPABASE_URL GitHub repository variable is required for production image builds." >&2
            exit 1
          }
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" || {
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY GitHub repository secret is required for production image builds." >&2
            exit 1
          }
          test -n "$NEXT_PUBLIC_MAPBOX_TOKEN" || {
            echo "NEXT_PUBLIC_MAPBOX_TOKEN GitHub repository variable is required for production image builds." >&2
            exit 1
          }

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_SHA_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ vars.NEXT_PUBLIC_SITE_URL || 'https://topopass.co.uk' }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ vars.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_MAPBOX_TOKEN="${{ vars.NEXT_PUBLIC_MAPBOX_TOKEN }}" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_SHA_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .

      - name: Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_SHA_TAG: ${{ github.sha }}
        run: |
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_SHA_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
